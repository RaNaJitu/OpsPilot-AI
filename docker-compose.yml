name: "OpsPilot-AI"

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: OpsPilot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d OpsPilot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - OpsPilot-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dmin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - OpsPilot-network

  redis:
    image: redis/redis-stack:6.2.6-v19
    container_name: redis_insider
    restart: always
    environment:
      REDIS_ARGS: "--requirepass irctcpass"
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "irctcpass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - OpsPilot-network

  # Optional full-stack API (profile: app)
  # Usage: docker compose --profile app up -d --build
  app:
    profiles: ["app"]
    build: .
    image: opspilot-backend:local
    container_name: opspilot-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # In-compose hostnames (override localhost from .env)
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/OpsPilot
      REDIS_URL: redis://:irctcpass@redis:6379
      PORT: "4001"
      HOST: "0.0.0.0"
      NODE_ENV: production
    ports:
      - "${HOST_PORT:-4001}:4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - OpsPilot-network

volumes:
  postgres_data:
  redis_data:

networks:
  OpsPilot-network:
    driver: bridge
